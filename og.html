<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>OG · Ligas do Brasil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caprasimo&family=DM+Sans:wght@400;500;700;900&display=swap">
  <style>
    :root {
      --ink: #0C0E0A;
      --paper: #F4EFE3;
      --green: #007A40;
      --green-bright: #12BE6F;
      --gold: #FFCB05;
      --blue: #0A46B0;
      --terra: #D8552F;
      --font-display: "Caprasimo", "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
      --font-sans:    "DM Sans", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      background: var(--ink);
      color: var(--paper);
      font-family: var(--font-sans);
      font-synthesis: none;
      position: relative;
    }

    .pitch {
      position: absolute;
      right: 80px;
      top: 72px;
      width: 260px;
      height: 165px;
    }

    .stack {
      position: absolute;
      inset: 0;
      padding: 72px 80px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 1;
    }

    .eyebrow {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .eyebrow::before {
      content: '';
      width: 42px;
      height: 2px;
      background: var(--gold);
      display: inline-block;
    }

    .headline {
      font-family: var(--font-display);
      font-weight: normal;
      font-size: 80px;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--paper);
      max-width: 780px;
      text-wrap: balance;
    }
    .headline .num { color: var(--gold); }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: rgba(244, 239, 227, 0.16);
      border: 1px solid rgba(244, 239, 227, 0.16);
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .stat {
      background: var(--ink);
      padding: 20px 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 128px;
      font-family: var(--font-sans);
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(244, 239, 227, 0.7);
      line-height: 1.35;
    }
    .stat .n {
      font-family: var(--font-display);
      font-weight: normal;
      font-size: 60px;
      line-height: 0.9;
      letter-spacing: -0.02em;
      color: var(--green-bright);
      text-transform: none;
      font-variant-numeric: tabular-nums;
    }
    .stat .lbl { margin-top: auto; }
  </style>
</head>
<body>
  <svg class="pitch" viewBox="0 0 300 190" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <rect x="4" y="47" width="46" height="96" stroke="#FFCB05" stroke-width="2.5"/>
    <rect x="4" y="72" width="18" height="46" stroke="#FFCB05" stroke-width="2.5"/>
    <rect x="250" y="47" width="46" height="96" stroke="#FFCB05" stroke-width="2.5"/>
    <rect x="278" y="72" width="18" height="46" stroke="#FFCB05" stroke-width="2.5"/>
    <rect x="4" y="4" width="292" height="182" stroke="#007A40" stroke-width="2.5"/>
    <line x1="150" y1="4" x2="150" y2="186" stroke="#007A40" stroke-width="2.5"/>
    <circle cx="150" cy="95" r="30" stroke="#0A46B0" stroke-width="2.5"/>
    <circle cx="150" cy="95" r="3.5" fill="#0A46B0"/>
    <circle cx="35" cy="95" r="3" fill="#FFCB05"/>
    <circle cx="265" cy="95" r="3" fill="#FFCB05"/>
  </svg>

  <div class="stack">
    <p class="eyebrow">Ligas do Brasil</p>

    <h1 class="headline">
      Não cabe um Brasil inteiro em&nbsp;apenas <span class="num">20 times.</span>
    </h1>

    <ul class="stats">
      <li class="stat"><span class="n">216</span><span class="lbl">Clubes nas Séries A e B</span></li>
      <li class="stat"><span class="n">64</span><span class="lbl">Teto de jogos por temporada</span></li>
      <li class="stat"><span class="n">10</span><span class="lbl">Meses de calendário garantido</span></li>
      <li class="stat"><span class="n">0</span><span class="lbl">Clubes sem calendário em abril</span></li>
    </ul>
  </div>
</body>
</html>
